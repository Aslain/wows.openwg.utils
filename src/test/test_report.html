<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Report</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body.drag-over::before {
            content: "Drop the file here";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 123, 255, 0.7);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            z-index: 1050;
            border: 4px dashed #fff;
        }
        .table-hover tbody tr:hover {
            background-color: #f5f5f5;
        }
        .test-name {
            font-weight: 500;
        }
        .group-name {
            font-weight: bold;
        }
        .status-icon {
            width: 1.5rem; /* For alignment */
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container mt-4">
        <h1 class="mb-4">Test Report</h1>

        <div class="card mb-4">
            <div class="card-header">
                Data Upload
            </div>
            <div class="card-body text-center">
                 <p class="lead">Drag and drop the <code>test_result.json</code> file anywhere on the page or select it manually.</p>
                <label for="file-input" class="btn btn-primary">
                    Select File
                    <input type="file" id="file-input" accept=".json" class="d-none">
                </label>
            </div>
        </div>

        <div class="card mb-4 d-none" id="stats-card">
            <div class="card-header">
                Overall Statistics
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-3"><strong>Total tests:</strong> <span id="total-tests">...</span></div>
                    <div class="col-md-3"><strong>Passed:</strong> <span id="passed-tests" class="text-success fw-bold">...</span></div>
                    <div class="col-md-3"><strong>Failed:</strong> <span id="failed-tests" class="text-danger fw-bold">...</span></div>
                    <div class="col-md-3"><strong>Success rate:</strong> <span id="success-rate">...</span></div>
                </div>
            </div>
        </div>

        <div id="results-container">
            <div class="alert alert-info d-flex align-items-center" role="alert">
                <i class="bi bi-upload fs-4 me-3"></i>
                <div>
                    <strong>Getting Started</strong><br>
                    Please drag and drop or select the <code>test_result.json</code> file to begin the analysis.
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const fileInput = document.getElementById('file-input');
            const resultsContainer = document.getElementById('results-container');
            const statsCard = document.getElementById('stats-card');
            const totalEl = document.getElementById('total-tests');
            const passedEl = document.getElementById('passed-tests');
            const failedEl = document.getElementById('failed-tests');
            const rateEl = document.getElementById('success-rate');
            const body = document.body;

            const calculateStats = (node) => {
                let stats = { total: 0, passed: 0 };
                if (typeof node === 'boolean') {
                    stats.total = 1;
                    stats.passed = node ? 1 : 0;
                } else if (typeof node === 'object' && node !== null) {
                    for (const key in node) {
                        const childStats = calculateStats(node[key]);
                        stats.total += childStats.total;
                        stats.passed += childStats.passed;
                    }
                }
                return stats;
            };

            const renderTableRows = (node, name, level = 0) => {
                const isTest = typeof node === 'boolean';
                let html = '';
                const indentation = level * 30; // 30px per level

                if (isTest) {
                    const icon = node
                        ? '<i class="bi bi-check-circle-fill text-success"></i>'
                        : '<i class="bi bi-x-circle-fill text-danger"></i>';
                    html += `
                        <tr>
                            <td class="test-name" style="padding-left: ${indentation}px;">${name}</td>
                            <td class="status-icon">${icon}</td>
                            <td></td>
                        </tr>`;
                } else if (typeof node === 'object' && node !== null) {
                    const childStats = calculateStats(node);
                    html += `
                        <tr class="table-light">
                            <td class="group-name" style="padding-left: ${indentation}px;">${name}</td>
                            <td></td>
                            <td class="fw-bold">${childStats.passed} / ${childStats.total}</td>
                        </tr>`;
                    
                    for (const [key, value] of Object.entries(node)) {
                        html += renderTableRows(value, key, level + 1);
                    }
                }
                return html;
            };

            const processData = (jsonData) => {
                statsCard.classList.remove('d-none');
                const totalStats = calculateStats(jsonData);
                totalEl.textContent = totalStats.total;
                passedEl.textContent = totalStats.passed;
                const failedCount = totalStats.total - totalStats.passed;
                failedEl.textContent = failedCount;
                const successPercentage = totalStats.total > 0 ? (totalStats.passed / totalStats.total) * 100 : 0;
                rateEl.textContent = `${successPercentage.toFixed(2)}%`;

                const tableBodyHtml = renderTableRows(jsonData, 'All Tests');
                resultsContainer.innerHTML = `
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th scope="col">Test Name / Group</th>
                                <th scope="col" class="text-center">Status</th>
                                <th scope="col">Group Statistics</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tableBodyHtml}
                        </tbody>
                    </table>`;
            };
            
            const handleFile = (file) => {
                if (!file || !file.type.match('application/json')) {
                    showError('Invalid file type. Please select a JSON file.');
                    return;
                }
                
                const reader = new FileReader();

                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        processData(data);
                    } catch (error) {
                        showError(`Invalid JSON file. ${error.message}`);
                    }
                };
                
                reader.onerror = () => {
                   showError(`Error reading file: ${reader.error}`);
                };

                reader.readAsText(file);
            };

            const showError = (message) => {
                 console.error(message);
                 resultsContainer.innerHTML = `
                    <div class="alert alert-danger" role="alert">
                        <strong>Error!</strong> ${message}
                    </div>`;
                statsCard.classList.add('d-none');
            }

            fileInput.addEventListener('change', (event) => handleFile(event.target.files[0]));

            // Drag and Drop events
            body.addEventListener('dragenter', (e) => {
                e.preventDefault();
                e.stopPropagation();
                body.classList.add('drag-over');
            });
            body.addEventListener('dragover', (e) => {
                e.preventDefault();
                e.stopPropagation();
            });
            body.addEventListener('dragleave', (e) => {
                e.preventDefault();
                e.stopPropagation();
                body.classList.remove('drag-over');
            });
            body.addEventListener('drop', (e) => {
                e.preventDefault();
                e.stopPropagation();
                body.classList.remove('drag-over');
                const file = e.dataTransfer.files[0];
                handleFile(file);
            });
        });
    </script>
</body>
</html>
